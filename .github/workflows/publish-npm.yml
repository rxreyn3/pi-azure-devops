name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          EXPECTED_TAG="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match package version tag $EXPECTED_TAG."
            exit 1
          fi

      - name: Verify package version is unpublished
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          set +e
          VIEW_OUTPUT="$(npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org/ 2>&1)"
          VIEW_STATUS=$?
          set -e
          if [ "$VIEW_STATUS" -eq 0 ]; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published on npm."
            exit 1
          fi
          if printf '%s\n' "$VIEW_OUTPUT" | grep -q 'E404'; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet."
          else
            printf '%s\n' "$VIEW_OUTPUT"
            exit "$VIEW_STATUS"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public
