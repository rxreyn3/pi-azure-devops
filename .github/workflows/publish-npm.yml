name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Bump, tag, and publish to npm
    runs-on: ubuntu-latest
    environment: npm-production

    steps:
      - name: Verify dispatch branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Publish must be run from main; received ${GITHUB_REF}."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          npm version "$BUMP" --no-git-tag-version
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG="v$PACKAGE_VERSION"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify package version is unpublished
        env:
          PACKAGE_NAME: ${{ steps.version.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set +e
          VIEW_OUTPUT="$(npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org/ 2>&1)"
          VIEW_STATUS=$?
          set -e
          if [ "$VIEW_STATUS" -eq 0 ]; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published on npm."
            exit 1
          fi
          if printf '%s\n' "$VIEW_OUTPUT" | grep -q 'E404'; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet."
          else
            printf '%s\n' "$VIEW_OUTPUT"
            exit "$VIEW_STATUS"
          fi

      - name: Verify release tag is unused
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Commit and tag version
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Bump package version to $PACKAGE_VERSION"
          git tag "$TAG"
          git push --atomic origin HEAD:main "refs/tags/$TAG"

      - name: Publish package
        run: npm publish --access public
